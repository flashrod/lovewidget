# ========================
# LoveWidget SwiftLint
# ========================

included:
  - App
  - WidgetExtension
  - LoveWidgetCore/Sources

excluded:
  - .build
  - DerivedData
  - LoveWidgetCore/.build

# ========================
# Rules
# ========================

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - operator_usage_whitespace
  - optional_enum_case_matching
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - strict_fileprivate
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma

# ========================
# Rule Configuration
# ========================

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 8
  error: 10

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]
  validates_start_with_lowercase: warning

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 60
    error: 80

force_cast: error
force_try: error
force_unwrapping: error

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 4

cyclomatic_complexity:
  warning: 15
  error: 25
