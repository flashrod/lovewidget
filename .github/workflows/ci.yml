name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --config .swiftlint.yml --strict

  test:
    name: Build and Test
    runs-on: macos-14
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Create Config.xcconfig
        run: cp Config.xcconfig.template Config.xcconfig

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project LoveWidget.xcodeproj \
            -scheme LoveWidget

      - name: Build LoveWidgetCore
        run: |
          xcodebuild build \
            -scheme LoveWidgetCore \
            -sdk macosx \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project LoveWidget.xcodeproj \
            -scheme LoveWidget \
            -sdk macosx \
            -destination 'platform=macOS' \
            -testPlan LoveWidget \
            -only-testing:LoveWidgetTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Upload Test Coverage
        if: success()
        run: |
          bash <(curl -s https://codecov.io/bash) -J 'LoveWidgetCore' -t ${{ secrets.CODECOV_TOKEN }} || true

  build-widget:
    name: Build Widget Extension
    runs-on: macos-14
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Create Config.xcconfig
        run: cp Config.xcconfig.template Config.xcconfig

      - name: Build Widget Extension
        run: |
          xcodebuild build \
            -project LoveWidget.xcodeproj \
            -scheme LoveWidgetExtension \
            -sdk macosx \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
