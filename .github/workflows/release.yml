name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and Notarize
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Setup Code Signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASS: ${{ secrets.KEYCHAIN_PASS }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" build.keychain

      - name: Create Config.xcconfig
        run: cp Config.xcconfig.template Config.xcconfig

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project LoveWidget.xcodeproj \
            -scheme LoveWidget \
            -archivePath build/LoveWidget.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE }}"

      - name: Export Notarized DMG
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LoveWidget.xcarchive \
            -exportPath build/LoveWidget.dmg \
            -exportOptionsPlist export_options.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          ditto -c -k --keepParent "build/LoveWidget.dmg" "build/LoveWidget.zip"
          xcrun notarytool submit "build/LoveWidget.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Staple
        run: xcrun stapler staple "build/LoveWidget.dmg"

      - name: Generate Checksum
        run: shasum -a 256 "build/LoveWidget.dmg" > build/LoveWidget.dmg.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LoveWidget ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            build/LoveWidget.dmg
            build/LoveWidget.dmg.sha256
